name: Build Mac App

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - name: 소스코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 세팅하기
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 필수 패키지 설치
        run: npm install

      - name: Mac용 빌드(.dmg) 실행
        run: npm run build:mac

      - name: 완성된 파일 추출하기
        uses: actions/upload-artifact@v4
        with:
          name: TRPG-Narrator-Mac
          path: dist/*.dmg
